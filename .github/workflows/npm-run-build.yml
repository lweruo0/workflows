name: npm run build
run-name: "⚙️ npm run build (${{ github.actor }} auf ${{ github.ref_name }})"

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: break if there is no package.json
        id: package_json
        run: |
          if ! find . -name "package.json" | grep -q .; then
            echo "No package.json found. Skipping npm build."
            echo "exists=false" >> "$GITHUB_OUTPUT"
            exit 0
          else
            echo "exists=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install nodejs and npm
        if: steps.package_json.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        if: steps.package_json.outputs.exists == 'true'
        run: |
          if find . -name "package-lock.json" | grep -q .; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi

      - name: npm run
        if: steps.package_json.outputs.exists == 'true'
        run: npm run build

      - name: Commit and push build files
        if: steps.package_json.outputs.exists == 'true'
        run: |
          git config --global user.email noreply@github.com
          git config --global user.name "github-actions[bot]"
          git add ./build/*
          git commit -m "build" || true
          git push origin HEAD:${{ github.ref_name }} || true
