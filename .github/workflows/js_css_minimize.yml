name: JS & CSS Minimize
run-name: "✨ JS & CSS Minimize (${{ github.actor }} auf ${{ github.ref_name }})"

on:
  workflow_call:

jobs:
  minimize_js_css:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: npm install -g terser postcss-cli cssnano stylelint stylelint-config-standard eslint


      - name: Lint JS
        run: eslint "**/*.js" --ignore-pattern "**/*.min.js" --ignore-pattern "**/*patched.js"

      - name: Minimize JS
        run: |
          find . -type f -name "*.js" ! -name "*.min.js" ! -name "*patched.js" | while read -r file; do
            out="${file%.js}.min.js"
            if [ -s "$file" ]; then
              terser "$file" -o "$out" --compress --mangle
            else
              cp "$file" "$out"
            fi
          done


      - name: Lint CSS
        run: npx stylelint "**/*.css" "!**/*.min.css" "!**/*patched.css"

      - name: Minimize CSS
        run: |
          find . -type f -name "*.css" ! -name "*.min.css" ! -name "*patched.css" | while read -r file; do
            out="${file%.css}.min.css"
            if [ -s "$file" ]; then
              postcss "$file" --use cssnano -o "$out"
            else
              cp "$file" "$out"
            fi
          done

      - name: check if .gitignore exists
        run: |
          if [ ! -f .gitignore ]; then
            echo "" > .gitignore
            echo "*.pyc" >> .gitignore
            echo "*.pyo" >> .gitignore
            echo "*.xml" >> .gitignore
            echo "*.pkl" >> .gitignore
            echo "" >> .gitignore
            echo "# Project-files" >> .gitignore
            echo ".idea/" >> .gitignore
            echo ".project" >> .gitignore
            echo ".pydevproject" >> .gitignore
            echo ".settings/" >> .gitignore
            echo "*.code-workspace" >> .gitignore
            echo "" >> .gitignore
            echo "# =========================" >> .gitignore
            echo "# Node / npx" >> .gitignore
            echo "# =========================" >> .gitignore
            echo "node_modules/" >> .gitignore
            echo "npm-debug.log*" >> .gitignore
            echo "yarn-debug.log*" >> .gitignore
            echo "yarn-error.log*" >> .gitignore
            echo ".pnpm-debug.log*" >> .gitignore
            echo "package-lock.json" >> .gitignore
            echo "yarn.lock" >> .gitignore
            echo "pnpm-lock.yaml" >> .gitignore
            echo ".npm/" >> .gitignore
            echo ".yarn/" >> .gitignore
            echo ".pnp.*" >> .gitignore
            echo "dist/" >> .gitignore
            echo "build/" >> .gitignore
            echo ".cache/" >> .gitignore
            echo ".parcel-cache/" >> .gitignore
            echo ".next/" >> .gitignore
            echo ".nuxt/" >> .gitignore
            echo ".vite/" >> .gitignore
            echo ".turbo/" >> .gitignore
            echo "*.tsbuildinfo" >> .gitignore
            echo ".env" >> .gitignore
            echo ".env.local" >> .gitignore
            echo ".env.*.local" >> .gitignore
            echo "" >> .gitignore
            echo "# =========================" >> .gitignore
            echo "# Composer / PHP" >> .gitignore
            echo "# =========================" >> .gitignore
            echo "composer.phar" >> .gitignore
            echo "vendor/" >> .gitignore
            echo "composer.lock" >> .gitignore
            echo ".phpunit.result.cache" >> .gitignore
            echo ".php-cs-fixer.cache" >> .gitignore
            echo "phpstan.neon.dist" >> .gitignore
            echo "*.cache" >> .gitignore
            echo "storage/" >> .gitignore
            echo "bootstrap/cache/" >> .gitignore
          fi

      - name: Commit and push minimized files
        run: |
          git config --global user.email noreply@github.com
          git config --global user.name "github-actions[bot]"
          git config --global advice.addIgnoredFile false

          files_to_add=""
          css_files=$(find . -type f -name "*.min.css")
          js_files=$(find . -type f -name "*.min.js")
          if [ -n "$css_files" ]; then
            files_to_add="$files_to_add $css_files"
          fi
          if [ -n "$js_files" ]; then
            files_to_add="$files_to_add $js_files"
          fi
          if [ -n "$files_to_add" ]; then
            git add $files_to_add
            git commit -m "committing minimized css/js" || true
            git push origin HEAD:${{ github.ref_name }} || true
          else
            echo "No minimized files to commit."
          fi


