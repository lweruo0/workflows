name: PHPStan & PHP CS Fixer
run-name: "🐘 PHPStan & PHP CS Fixer (${{ github.actor }} auf ${{ github.ref_name }})"

on:
  workflow_call:

jobs:
  lint_php:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist

      - name: PHP Syntax Check
        run: find . -name '*.php' -not -path './vendor/*' -not -path './stubs/*' -print0 | xargs -0 -n1 php -l

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress

  php_cs_fixer:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install PHP and php-cs-fixer
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer, php-cs-fixer

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist

      - name: Run php-cs-fixer
        run: |
          php-cs-fixer fix --allow-risky=yes --diff --verbose
          echo "php-cs-fixer run completed."


      - name: check if .gitignore exists
        run: |
          if [ ! -f .gitignore ]; then
            echo "" > .gitignore
            echo "*.pyc" >> .gitignore
            echo "*.pyo" >> .gitignore
            echo "*.xml" >> .gitignore
            echo "*.pkl" >> .gitignore
            echo "" >> .gitignore
            echo "# Project-files" >> .gitignore
            echo ".idea/" >> .gitignore
            echo ".project" >> .gitignore
            echo ".pydevproject" >> .gitignore
            echo ".settings/" >> .gitignore
            echo "*.code-workspace" >> .gitignore
            echo "" >> .gitignore
            echo "# =========================" >> .gitignore
            echo "# Node / npx" >> .gitignore
            echo "# =========================" >> .gitignore
            echo "node_modules/" >> .gitignore
            echo "npm-debug.log*" >> .gitignore
            echo "yarn-debug.log*" >> .gitignore
            echo "yarn-error.log*" >> .gitignore
            echo ".pnpm-debug.log*" >> .gitignore
            echo "package-lock.json" >> .gitignore
            echo "yarn.lock" >> .gitignore
            echo "pnpm-lock.yaml" >> .gitignore
            echo ".npm/" >> .gitignore
            echo ".yarn/" >> .gitignore
            echo ".pnp.*" >> .gitignore
            echo "dist/" >> .gitignore
            echo "build/" >> .gitignore
            echo ".cache/" >> .gitignore
            echo ".parcel-cache/" >> .gitignore
            echo ".next/" >> .gitignore
            echo ".nuxt/" >> .gitignore
            echo ".vite/" >> .gitignore
            echo ".turbo/" >> .gitignore
            echo "*.tsbuildinfo" >> .gitignore
            echo ".env" >> .gitignore
            echo ".env.local" >> .gitignore
            echo ".env.*.local" >> .gitignore
            echo "" >> .gitignore
            echo "# =========================" >> .gitignore
            echo "# Composer / PHP" >> .gitignore
            echo "# =========================" >> .gitignore
            echo "composer.phar" >> .gitignore
            echo "vendor/" >> .gitignore
            echo "composer.lock" >> .gitignore
            echo ".phpunit.result.cache" >> .gitignore
            echo ".php-cs-fixer.cache" >> .gitignore
            echo "phpstan.neon.dist" >> .gitignore
            echo "*.cache" >> .gitignore
            echo "storage/" >> .gitignore
            echo "bootstrap/cache/" >> .gitignore
          fi

      - name: Commit and push fixed php files
        run: |
          rm -rf vendor 
          rm -rf node_modules
          rm -rf storage
          git config --global user.email noreply@github.com
          git config --global user.name "github-actions[bot]"
          git config --global advice.addIgnoredFile false
  
          files_to_add=""
          php_files=$(find . -type f -name "*.php")
          if [ -n "$php_files" ]; then
            files_to_add="$files_to_add $php_files"
          fi
          if [ -n "$files_to_add" ]; then
            git add $files_to_add
            git commit -m "committing fixed php files" || true
            git push origin HEAD:${{ github.ref_name }} || true
          else
            echo "No fixed php files to commit."
          fi