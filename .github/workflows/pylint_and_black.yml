name: Pylint & Black
run-name: "🐍 Pylint & Black (${{ github.actor }} auf ${{ github.ref_name }})"

on:
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: break if there is no python file
        id: python_files
        run: |
          if ! find . -name "*.py" | grep -q .; then
            echo "No Python files found. Skipping linting and formatting."
            echo "exists=false" >> "$GITHUB_OUTPUT"
            exit 0
          else
            echo "exists=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.python_files.outputs.exists == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        if: steps.python_files.outputs.exists == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade pylint black paramiko pywebview

      - name: check if pylintrc exists
        if: steps.python_files.outputs.exists == 'true'
        run: |
          if [ ! -f .pylintrc ]; then
            echo "" > .pylintrc
            echo "[MASTER]" >> .pylintrc
            echo "ignore=venv" >> .pylintrc
            echo "" >> .pylintrc
            echo "[MESSAGES CONTROL]" >> .pylintrc
            echo "disable=C0114,C0115,C0116,bad-indentation,C0301,R0801" >> .pylintrc
            echo "" >> .pylintrc
            echo "[FORMAT]" >> .pylintrc
            echo "max-line-length=120" >> .pylintrc
            echo "" >> .pylintrc
            echo "[DESIGN]" >> .pylintrc
            echo "max-args=8" >> .pylintrc
            echo "max-locals=20" >> .pylintrc
            echo "max-returns=6" >> .pylintrc
            echo "max-branches=12" >> .pylintrc
            echo "max-statements=50" >> .pylintrc
            echo "max-parents=7" >> .pylintrc
            echo "max-attributes=10" >> .pylintrc
            echo "max-public-methods=20" >> .pylintrc
            echo "" >> .pylintrc
            echo "[REPORTS]" >> .pylintrc
            echo "output-format=colorized" >> .pylintrc
            echo "reports=no" >> .pylintrc
            echo "" >> .pylintrc
            echo "[TYPECHECK]" >> .pylintrc
            echo "generated-members=numpy.*,torch.*" >> .pylintrc
          fi

      - name: check if .gitignore exists
        if: steps.python_files.outputs.exists == 'true'
        run: |
          if [ ! -f .gitignore ]; then
            echo "" > .gitignore
            echo "*.pyc" >> .gitignore
            echo "*.pyo" >> .gitignore
            echo "*.xml" >> .gitignore
            echo "*.pkl" >> .gitignore
            echo "" >> .gitignore
            echo "# Project-files" >> .gitignore
            echo ".idea/" >> .gitignore
            echo ".project" >> .gitignore
            echo ".pydevproject" >> .gitignore
            echo ".settings/" >> .gitignore
            echo "*.code-workspace" >> .gitignore
            echo "" >> .gitignore
            echo "# =========================" >> .gitignore
            echo "# Node / npx" >> .gitignore
            echo "# =========================" >> .gitignore
            echo "node_modules/" >> .gitignore
            echo "npm-debug.log*" >> .gitignore
            echo "yarn-debug.log*" >> .gitignore
            echo "yarn-error.log*" >> .gitignore
            echo ".pnpm-debug.log*" >> .gitignore
            echo "package-lock.json" >> .gitignore
            echo "yarn.lock" >> .gitignore
            echo "pnpm-lock.yaml" >> .gitignore
            echo ".npm/" >> .gitignore
            echo ".yarn/" >> .gitignore
            echo ".pnp.*" >> .gitignore
            echo "dist/" >> .gitignore
            echo "build/" >> .gitignore
            echo ".cache/" >> .gitignore
            echo ".parcel-cache/" >> .gitignore
            echo ".next/" >> .gitignore
            echo ".nuxt/" >> .gitignore
            echo ".vite/" >> .gitignore
            echo ".turbo/" >> .gitignore
            echo "*.tsbuildinfo" >> .gitignore
            echo ".env" >> .gitignore
            echo ".env.local" >> .gitignore
            echo ".env.*.local" >> .gitignore
            echo "" >> .gitignore
            echo "# =========================" >> .gitignore
            echo "# Composer / PHP" >> .gitignore
            echo "# =========================" >> .gitignore
            echo "composer.phar" >> .gitignore
            echo "vendor/" >> .gitignore
            echo "composer.lock" >> .gitignore
            echo ".phpunit.result.cache" >> .gitignore
            echo ".php-cs-fixer.cache" >> .gitignore
            echo "phpstan.neon.dist" >> .gitignore
            echo "*.cache" >> .gitignore
            echo "storage/" >> .gitignore
            echo "bootstrap/cache/" >> .gitignore
          fi

      - name: Lint with pylint
        if: steps.python_files.outputs.exists == 'true'
        run: |
          find . -name "*.py" | xargs pylint --fail-under=9

      - name: Format code with Black
        if: steps.python_files.outputs.exists == 'true'
        run: |
          black .

      - name: Commit changes if needed
        if: steps.python_files.outputs.exists == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git config --global advice.addIgnoredFile false

          if [[ -n $(git status --porcelain) ]]; then
            git add .
            git commit -m "style: auto-format Python code with Black"
            git push origin HEAD:${{ github.ref_name }} || true
          fi
