name: Pylint & Black
run-name: "🐍 Pylint & Black (${{ github.actor }} auf ${{ github.ref_name }})"

on:
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade pylint black paramiko pywebview

      - name: break if there is no python file
        run: |
          if ! find . -name "*.py" | grep -q .; then
            echo "No Python files found. Skipping linting and formatting."
            exit 0
          fi

      - name: check if pylintrc exists
        run: |
          if [ ! -f .pylintrc ]; then
            cat <<EOF > .pylintrc
[MASTER]
ignore=venv

[MESSAGES CONTROL]
disable=C0114,C0115,C0116,bad-indentation,C0301,R0801

[FORMAT]
max-line-length=120

[DESIGN]
max-args=8
max-locals=20
max-returns=6
max-branches=12
max-statements=50
max-parents=7
max-attributes=10
max-public-methods=20

[REPORTS]
output-format=colorized
reports=no

[TYPECHECK]
generated-members=numpy.*,torch.*
EOF
          fi


      - name: Lint with pylint
        run: |
          find . -name "*.py" | xargs pylint --fail-under=9

      - name: Format code with Black
        run: |
          black .

      - name: Commit changes if needed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          if [[ -n $(git status --porcelain) ]]; then
            git add .
            git commit -m "style: auto-format Python code with Black"
            git push origin HEAD:${{ github.ref_name }} || true
          fi
